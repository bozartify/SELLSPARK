name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/creatoros_ci?schema=public
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ci-build-placeholder-32-chars-minimum-ok
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  STRIPE_SECRET_KEY: sk_test_ci
  STRIPE_WEBHOOK_SECRET: whsec_ci
  # Skip telemetry noise in CI
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
        continue-on-error: true
